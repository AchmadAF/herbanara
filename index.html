<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbanara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #333; font-size: 3em; margin: 20px 0; }
        .emoji { font-size: 4em; }
        p { color: #666; font-size: 1.1em; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌿</div>
        <h1>Herbanara</h1>
        <p>Healthy living project for better life</p>
        <p style="margin-top: 30px; color: #0ea5e9;"><strong>✓ Live on Vercel</strong></p>
    </div>
</body>
</html>
